name: Deploy (dev)

on:
  push:
    branches: [develop]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  ECR_REPO: __APP_SLUG__
  ECS_CLUSTER: microport-dev
  ECS_SERVICE: __APP_SLUG__-dev    # dev task role omits ses:SendEmail

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build & push API image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPO:dev-$GITHUB_SHA"
          docker build --build-arg NODE_AUTH_TOKEN="$NODE_AUTH_TOKEN" -t "$IMAGE" .
          docker push "$IMAGE"
      - name: Roll the dev ECS service
        run: |
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE" --force-new-deployment >/dev/null
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"
